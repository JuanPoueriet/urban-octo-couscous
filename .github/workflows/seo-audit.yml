name: SEO and Performance Audit

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Build Application
        run: npx nx build app
      - name: Validate SEO i18n content quality
        run: npm run seo:i18n:validate
      - name: Validate SSR SEO output (critical routes)
        run: npm run seo:ssr:check
      - name: Run Lighthouse Audit
        run: |
          npm install -g @lhci/cli@0.13.x
          npm run lighthouse
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report-${{ github.run_id }}
          path: |
            .lighthouseci
            apps/app/lighthouse-results
          if-no-files-found: warn
