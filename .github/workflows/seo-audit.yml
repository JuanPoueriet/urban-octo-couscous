name: SEO and Performance Audit

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-seo:
    name: Validate SEO Content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate SEO i18n content quality
        run: npm run seo:i18n:validate

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: validate-seo
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Restore build cache
        id: cache-build
        uses: actions/cache@v4
        with:
          path: dist/apps/app
          key: build-${{ github.sha }}
          restore-keys: build-

      - name: Build Application
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: npx nx build app --configuration=production

      - name: Save build cache
        if: steps.cache-build.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: dist/apps/app
          key: build-${{ github.sha }}

      - name: Validate SSR SEO output (critical routes)
        run: npm run seo:ssr:check

      - name: Run Lighthouse Audit
        run: |
          npm install -g @lhci/cli@0.13.x
          npm run lighthouse
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report-${{ github.run_id }}
          path: |
            .lighthouseci
            apps/app/lighthouse-results
          if-no-files-found: warn
