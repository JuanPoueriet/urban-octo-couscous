<div class="roi-calculator-card">
  <div class="roi-header">
    <div class="icon-wrapper">
      <lucide-icon [name]="icons.Calculator"></lucide-icon>
    </div>
    <h3>ROI Calculator</h3>
    <p>Estimate your potential savings with automation.</p>
  </div>

  <div class="roi-content">
    <div class="inputs-section">
      <div class="input-group">
        <label>
          <lucide-icon [name]="icons.Clock" size="16"></lucide-icon>
          Hours saved per week (per employee)
        </label>
        <div class="range-wrapper">
          <input
            type="range"
            [ngModel]="hoursSaved()"
            (ngModelChange)="hoursSaved.set($event)"
            min="1" max="40" step="1">
          <span class="value">{{ hoursSaved() }} hrs</span>
        </div>
      </div>

      <div class="input-group">
        <label>
          <lucide-icon [name]="icons.DollarSign" size="16"></lucide-icon>
          Hourly Rate (avg)
        </label>
        <div class="range-wrapper">
          <input
            type="range"
            [ngModel]="hourlyRate()"
            (ngModelChange)="hourlyRate.set($event)"
            min="10" max="200" step="5">
          <span class="value">${{ hourlyRate() }}</span>
        </div>
      </div>

      <div class="input-group">
        <label>
          <lucide-icon [name]="icons.Users" size="16"></lucide-icon>
          Number of Employees
        </label>
        <div class="range-wrapper">
          <input
            type="range"
            [ngModel]="employees()"
            (ngModelChange)="employees.set($event)"
            min="1" max="100" step="1">
          <span class="value">{{ employees() }}</span>
        </div>
      </div>
    </div>

    <div class="results-section">
      <div class="result-item">
        <span class="label">Monthly Savings</span>
        <span class="amount">{{ formatCurrency(monthlySavings()) }}</span>
      </div>
      <div class="result-item highlight">
        <span class="label">Annual Savings</span>
        <span class="amount">{{ formatCurrency(annualSavings()) }}</span>
      </div>
      <p class="disclaimer">
        * Estimates based on provided inputs. Actual savings may vary.
      </p>
    </div>
  </div>
</div>
