<div
  class="comparison-container"
  #container
  (mousedown)="onMouseDown($event)"
  (touchstart)="onTouchStart($event)"
>
  <div class="image-wrapper after-image">
    <img [src]="afterImage" [alt]="alt + ' - ' + afterLabel">
    <span class="label after-label">{{ afterLabel }}</span>
  </div>

  <div
    class="image-wrapper before-image"
    [style.clip-path]="'inset(0 ' + (100 - sliderPosition) + '% 0 0)'"
  >
    <img [src]="beforeImage" [alt]="alt + ' - ' + beforeLabel">
    <span class="label before-label">{{ beforeLabel }}</span>
  </div>

  <div
    class="slider-handle"
    [style.left.%]="sliderPosition"
    tabindex="0"
    role="slider"
    [attr.aria-valuenow]="sliderPosition"
    aria-valuemin="0"
    aria-valuemax="100"
    [attr.aria-label]="'Comparison slider'"
    (keydown)="onKeyDown($event)"
  >
    <div class="handle-line"></div>
    <div class="handle-circle">
      <lucide-icon name="ChevronsLeftRight" size="16"></lucide-icon>
    </div>
  </div>
</div>
