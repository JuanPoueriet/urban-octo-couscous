@if (breadcrumbs.length > 0) {
  <nav aria-label="Breadcrumb" class="breadcrumbs">
    <ol>
      <li>
        <a routerLink="/" class="home-link">
          <lucide-icon [name]="icons.Home" [size]="16"></lucide-icon>
          <span class="sr-only">Home</span>
        </a>
      </li>
      @for (crumb of breadcrumbs; track crumb.url; let last = $last) {
        <li class="separator">
          <lucide-icon [name]="icons.ChevronRight" [size]="14"></lucide-icon>
        </li>
        <li [class.active]="last">
          @if (last) {
            <span [attr.aria-current]="'page'">{{ crumb.label | translate }}</span>
          } @else {
            <a [routerLink]="crumb.url">{{ crumb.label | translate }}</a>
          }
        </li>
      }
    </ol>
  </nav>
}
