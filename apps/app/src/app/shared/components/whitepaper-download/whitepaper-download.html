<div class="whitepaper-card">
  <div class="whitepaper-card__glow"></div>

  <div class="whitepaper-card__header">
    <div class="whitepaper-icon-wrap">
      <lucide-icon name="FileText" size="28"></lucide-icon>
    </div>
    <span class="whitepaper-card__badge">{{ 'WHITEPAPER.BADGE' | translate }}</span>
  </div>

  <div class="whitepaper-card__body">
    <h3 class="whitepaper-card__title">{{ titleKey | translate }}</h3>
    <p class="whitepaper-card__desc">{{ descriptionKey | translate }}</p>

    @if (!isSubmitted) {
      <form (submit)="onSubmit()" class="whitepaper-form">
        <div class="whitepaper-form__group">
          <lucide-icon name="Mail" size="15" class="input-icon"></lucide-icon>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            [placeholder]="'WHITEPAPER.EMAIL_PLACEHOLDER' | translate"
            required
            class="whitepaper-form__input"
          >
        </div>
        <button type="submit" class="whitepaper-form__btn">
          <lucide-icon name="Download" size="16"></lucide-icon>
          {{ 'WHITEPAPER.DOWNLOAD_BTN' | translate }}
        </button>
      </form>
      <p class="whitepaper-privacy">
        <lucide-icon name="Shield" size="12"></lucide-icon>
        {{ 'WHITEPAPER.NO_SPAM' | translate }}
      </p>
    } @else {
      <div class="whitepaper-success">
        <div class="whitepaper-success__icon">
          <lucide-icon name="CheckCircle" size="26"></lucide-icon>
        </div>
        <div>
          <p class="whitepaper-success__title">{{ 'WHITEPAPER.SENT_MSG' | translate }}</p>
          <p class="whitepaper-success__sub">{{ 'WHITEPAPER.CHECK_INBOX' | translate }}</p>
        </div>
      </div>
    }
  </div>
</div>
