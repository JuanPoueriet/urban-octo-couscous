<div class="social-share">
  <div class="share-container">
    <div class="share-header">
      <div class="header-line"></div>
      <span class="label">{{ 'SHARE.LABEL' | translate }}</span>
      <div class="header-line"></div>
    </div>

    <div class="buttons">
      <button (click)="share('linkedin')"
              [attr.aria-label]="'SHARE.SHARE_LINKEDIN' | translate"
              class="share-btn linkedin"
              [attr.title]="'SHARE.LINKEDIN' | translate">
        <lucide-icon [name]="icons.Linkedin" [size]="20"></lucide-icon>
      </button>

      <button (click)="share('twitter')"
              [attr.aria-label]="'SHARE.SHARE_TWITTER' | translate"
              class="share-btn twitter"
              [attr.title]="'SHARE.TWITTER' | translate">
        <lucide-icon [name]="icons.Twitter" [size]="20"></lucide-icon>
      </button>

      <button (click)="share('facebook')"
              [attr.aria-label]="'SHARE.SHARE_FACEBOOK' | translate"
              class="share-btn facebook"
              [attr.title]="'SHARE.FACEBOOK' | translate">
        <lucide-icon [name]="icons.Facebook" [size]="20"></lucide-icon>
      </button>

      <button (click)="share('mail')"
              [attr.aria-label]="'SHARE.SHARE_EMAIL' | translate"
              class="share-btn mail"
              [attr.title]="'SHARE.EMAIL' | translate">
        <lucide-icon [name]="icons.Mail" [size]="20"></lucide-icon>
      </button>

      <div class="copy-wrapper">
        <button (click)="copyLink()"
                [attr.aria-label]="'SHARE.COPY_LINK' | translate"
                class="share-btn copy"
                [class.is-copied]="copied()">
          <lucide-icon [name]="copied() ? icons.Check : icons.Link" [size]="20"></lucide-icon>
        </button>
        <span class="copy-tooltip" [class.show]="copied()">
          {{ 'COMMON.COPIED' | translate }}
        </span>
      </div>
    </div>
  </div>
</div>
