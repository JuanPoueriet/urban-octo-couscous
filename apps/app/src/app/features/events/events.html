<section class="events-hero">
  <div class="container">
    <h1>{{ 'EVENTS.TITLE' | translate }}</h1>
    <p class="subtitle">{{ 'EVENTS.SUBTITLE' | translate }}</p>
  </div>
</section>

<section class="events-list">
  <div class="container">
    <h2 class="section-title">{{ 'EVENTS.UPCOMING' | translate }}</h2>
    <div class="events-grid">
      <div class="event-card" *ngFor="let event of upcomingEvents">
        <div class="event-image" [style.backgroundImage]="'url(' + event.image + ')'"></div>
        <div class="event-content">
          <div class="event-date">{{ event.date }}</div>
          <h3>{{ event.title }}</h3>
          <p>{{ event.description }}</p>
          <button class="btn-register">{{ 'EVENTS.REGISTER' | translate }}</button>
        </div>
      </div>
    </div>

    <h2 class="section-title mt-5">{{ 'EVENTS.PAST' | translate }}</h2>
    <div class="events-grid">
      <div class="event-card" *ngFor="let event of pastEvents">
        <div class="event-image grayscale" [style.backgroundImage]="'url(' + event.image + ')'"></div>
        <div class="event-content">
          <div class="event-date">{{ event.date }}</div>
          <h3>{{ event.title }}</h3>
          <button class="btn-outline">Watch Recording</button>
        </div>
      </div>
    </div>
  </div>
</section>

<jsl-cta-section></jsl-cta-section>
