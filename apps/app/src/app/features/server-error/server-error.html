<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 px-4">
  <div class="text-center max-w-lg">
    <div class="mb-8 flex justify-center text-red-500">
      <lucide-icon [name]="icons.Server" [size]="64"></lucide-icon>
    </div>
    <h1 class="text-4xl font-bold text-gray-900 dark:text-white mb-4">500</h1>
    <h2 class="text-2xl font-semibold text-gray-800 dark:text-gray-200 mb-4">{{ 'ERRORS.500_TITLE' | translate }}</h2>
    <p class="text-gray-600 dark:text-gray-400 mb-8">{{ 'ERRORS.500_DESC' | translate }}</p>
