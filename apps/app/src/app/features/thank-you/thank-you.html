<div class="page-container">
  <div class="container">
    <div class="thank-you-page">
      <div class="thank-you-page__icon-container">
        <lucide-icon name="CheckCircle"></lucide-icon>
      </div>

      <h1 class="thank-you-page__title">{{ 'THANK_YOU.TITLE' | translate }}</h1>
      <h2 class="thank-you-page__message-title">{{ 'THANK_YOU.MSG_TITLE' | translate }}</h2>
      <p class="thank-you-page__message-desc">{{ 'THANK_YOU.MSG_DESC' | translate }}</p>

      <a routerLink="/" class="thank-you-page__button">
        <lucide-icon name="Home"></lucide-icon>
        {{ 'THANK_YOU.GO_HOME' | translate }}
      </a>
    </div>
  </div>
</div>
